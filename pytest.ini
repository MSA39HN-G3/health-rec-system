[pytest]
# Chạy test từ thư mục gốc repo; tests/ tự động được include.
testpaths = tests

# Hiển thị test ngắn gọn.
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short

# Tránh capture log spam làm chậm CI; các test cụ thể muốn xem log thì gọi `caplog`.
log_cli = false
log_cli_level = INFO

# Tự xoá cache khi kết thúc.
cache_dir = .pytest_cache

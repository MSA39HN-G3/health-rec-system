[pytest]
# Chạy test từ thư mục gốc repo; tests/ tự động được include.
testpaths = tests

# Thêm thư mục gốc repo vào sys.path để `import app.*` hoạt động.
# Bắt buộc khi chạy `pytest` từ CLI mà chưa cài project dưới dạng package
# (vd `pip install -e .`), đặc biệt trên Windows nơi cwd có thể khác.
pythonpath = .

# Hiển thị test ngắn gọn.
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short

# Tránh capture log spam làm chậm CI; các test cụ thể muốn xem log thì gọi `caplog`.
log_cli = false
log_cli_level = INFO

# Tự xoá cache khi kết thúc.
cache_dir = .pytest_cache

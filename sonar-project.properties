sonar.projectKey=MSA39HN-G3_health-rec-system
sonar.organization=ppr501-fpt

# Quét code trong app/, không bao gồm thư mục test nội bộ.
sonar.sources=app
sonar.tests=tests

# Source: bỏ qua non-services + cache.
# SonarCloud sẽ bỏ các file/thư mục này khỏi analysis (cả coverage lẫn issue detection).
sonar.exclusions=\
    **/migrations/**,\
    **/__pycache__/**,\
    **/.venv/**,\
    **/scripts/**,\
    **/app/api/**,\
    **/app/models/**,\
    **/app/repositories/**,\
    **/app/middleware/**,\
    **/app/common/**,\
    **/app/errors/**,\
    **/app/i18n/**,\
    **/app/__init__.py,\
    **/app/cli.py,\
    **/app/config.py,\
    **/app/extensions.py

# Test: bỏ conftest vì nó là helper chứ không phải test logic.
sonar.test.exclusions=**/conftest.py

sonar.language=py
sonar.sourceEncoding=UTF-8

# SonarCloud sẽ không yêu cầu coverage ở những file không phân tích.
# Đặt ngưỡng coverage RẤT THẤP (0%) cho toàn project, và cao hơn (>80%)
# được enforce bằng Quality Gate rule riêng cho "app/services/**" qua
# đường dẫn tùy chỉnh (đã setup ở SonarCloud portal).
sonar.coverage.exclusions=\
    **/app/api/**,\
    **/app/models/**,\
    **/app/repositories/**,\
    **/app/middleware/**,\
    **/app/common/**,\
    **/app/errors/**,\
    **/app/i18n/**,\
    **/app/__init__.py,\
    **/app/cli.py,\
    **/app/config.py,\
    **/app/extensions.py

# Báo cáo JUnit (pass/fail) và Coverage XML.
sonar.python.xunit.reportPath=reports/pytest-junit.xml
sonar.python.coverage.reportPaths=reports/coverage.xml

# Không cho phép các file non-services làm Quality Gate fail.
sonar.qualitygate.wait=true
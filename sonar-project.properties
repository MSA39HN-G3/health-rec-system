sonar.projectKey=MSA39HN-G3_health-rec-system
sonar.organization=ppr501-fpt

sonar.sources=app
sonar.tests=tests
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/.venv/**,**/scripts/**
sonar.test.exclusions=**/conftest.py

sonar.language=py
sonar.sourceEncoding=UTF-8

# Đường dẫn tới báo cáo XML của pytest (pytest-junit sinh ra file này).
sonar.python.xunit.reportPath=reports/pytest-junit.xml
# Đường dẫn tới báo cáo coverage XML (pytest-cov + coverage: --cov=app --cov-report=xml).
sonar.python.coverage.reportPaths=reports/coverage.xml

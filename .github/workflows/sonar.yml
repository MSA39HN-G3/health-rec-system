name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------------------------
      # 1) Chạy test + coverage TRƯỚC, sinh 2 file XML:
      #    reports/pytest-junit.xml — danh sách test (để SonarCloud đếm pass/fail)
      #    reports/coverage.xml     — đo coverage từng file (để SonarCloud vẽ biểu đồ)
      # ---------------------------------------------------------------
      - name: Run unit tests with coverage
        run: |
          mkdir -p reports
          pytest \
            --junitxml=reports/pytest-junit.xml \
            --cov=app \
            --cov-branch \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --no-header

      # ---------------------------------------------------------------
      # 2) Upload artifact để có thể tải về xem khi CI fail.
      # ---------------------------------------------------------------
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7

      # ---------------------------------------------------------------
      # 3) SonarCloud đọc 2 file XML ở trên (đường dẫn đã khai báo trong
      #    sonar-project.properties) để hiển thị Tests + Coverage.
      # ---------------------------------------------------------------
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_KEY }}